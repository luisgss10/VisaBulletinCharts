name: Visa Bulletin Monitor

on:
  schedule:
    # Runs daily at 2 pm PST (22:00 UTC)
    - cron: "0 22 * * *"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write   # needed to commit last_bulletin.json back

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python -m visa_bulletin.monitor

      - name: Commit updated state (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_bulletin.json
          if git diff --cached --quiet; then
            echo "No state change — nothing to commit."
          else
            git commit -m "chore: update last detected visa bulletin"
            git push
          fi
